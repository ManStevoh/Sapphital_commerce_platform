# SAPPHITAL SCP — Continuous Integration (Sprint 0)
# Spec: Vol 10 Ch. 06 (CI/CD pipeline)
# Traceability: ADR-023 (Platform OS), NFR-040 (tenant isolation tests in later sprints)
#
# Sprint 0 scope: lint + test on push to main. No deploy step.

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_ENV: testing
  APP_KEY: base64:dGVzdGluZ2tleWZvcnNjcG1vbnJlcG9zaXRvcnkyMDI2
  APP_DEBUG: true
  DATABASE_URL: pgsql://scp:scp@127.0.0.1:5432/scp_test
  DB_CONNECTION: pgsql
  DB_HOST: 127.0.0.1
  DB_PORT: 5432
  DB_DATABASE: scp_test
  DB_USERNAME: scp
  DB_PASSWORD: scp
  REDIS_URL: redis://127.0.0.1:6379
  MEILISEARCH_HOST: http://127.0.0.1:7700
  MEILISEARCH_KEY: ci_master_key
  SCP_PRIMARY_REGION: af-ng-lagos

jobs:
  # E2E — API (Nigeria GA)
  e2e-api:
    name: E2E — API (Nigeria GA)
    needs: php
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scp
          POSTGRES_PASSWORD: scp
          POSTGRES_DB: scp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scp -d scp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: bcmath, ctype, curl, dom, fileinfo, json, mbstring, openssl, pdo, pdo_pgsql, pgsql, redis, tokenizer, xml, zip
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: php artisan migrate --force
      - run: php artisan serve --host=127.0.0.1 --port=8000 &
      - run: sleep 3
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: bash e2e/scripts/run-e2e-api.sh
        env:
          BASE_URL: http://127.0.0.1:8000

  # Future: e2e job (Playwright UI) — run after storefront + marketing apps are CI-ready.
  # Requires: npm install in e2e/, playwright browsers, webServer or running apps.
  # See e2e/README.md and e2e/playwright.config.ts (webServer block commented).
  #
  # e2e:
  #   name: E2E — Playwright UI (Nigeria GA)
  #   needs: php
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: "20"
  #     - run: npm ci
  #       working-directory: e2e
  #     - run: npx playwright install --with-deps chromium
  #       working-directory: e2e
  #     - run: npx playwright test nigeria-ga.spec.ts
  #       working-directory: e2e

  php:
    name: PHP — lint & test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scp
          POSTGRES_PASSWORD: scp
          POSTGRES_DB: scp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scp -d scp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Laravel scaffold
        id: scaffold
        run: |
          if [ -f composer.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No composer.json — Sprint 0 infra scaffold only; PHP jobs skipped until S0.2"
          fi

      - name: Setup PHP
        if: steps.scaffold.outputs.present == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: bcmath, ctype, curl, dom, fileinfo, json, mbstring, openssl, pdo, pdo_pgsql, pgsql, redis, tokenizer, xml, zip
          coverage: none

      - name: Get Composer cache directory
        if: steps.scaffold.outputs.present == 'true'
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        if: steps.scaffold.outputs.present == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        if: steps.scaffold.outputs.present == 'true'
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Laravel Pint
        if: steps.scaffold.outputs.present == 'true'
        run: |
          if [ -f vendor/bin/pint ]; then
            vendor/bin/pint --test
          elif [ -f vendor/bin/laravel-pint ]; then
            vendor/bin/laravel-pint --test
          else
            echo "Pint not installed — skipping"
          fi

      - name: Run PHPUnit — full test suite
        if: steps.scaffold.outputs.present == 'true' && hashFiles('phpunit.xml', 'phpunit.xml.dist') != ''
        run: vendor/bin/phpunit --colors=always
